<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaFire Secure Download - FilmyDub4u</title>
  <style>
    body { background: #0c0f12; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 15px; margin: 0; }
    .container { max-width: 500px; margin: 50px auto; background: #13171c; padding: 35px 20px; border-radius: 16px; border: 1px solid #1e252b; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
    h2 { color: #0070FF; font-size: 28px; margin: 0 0 20px 0; font-family: 'Impact', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
    .movie-banner { width: 100%; max-width: 220px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: none; }
    .title-text { font-size: 22px; font-weight: bold; color: #FFD700; margin-bottom: 10px; }
    .mediafire-box { background: #0053C0; border: 1px solid #0070FF; border-radius: 8px; padding: 15px; margin-top: 25px; text-align: left; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,112,255,0.3); }
    .file-icon { font-size: 30px; margin-right: 15px; }
    .file-details { flex-grow: 1; }
    .file-name { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px; }
    .file-size { font-size: 12px; color: #add8e6; }
    .download-arrow { font-size: 22px; color: #fff; text-decoration: none; padding: 5px 10px; }
    .dl-action-btn { display: block; width: 100%; background: #0070FF; color: #fff; padding: 15px 0; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 16px; text-transform: uppercase; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,112,255,0.4); text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <h2>MEDIA<span style="color:#fff">FIRE</span></h2>
    <div style="width: 50px; height: 3px; background: #0070FF; margin: 10px auto 25px auto;"></div>
    
    <!-- Automatic Movie Details Block -->
    <img id="movie-poster" class="movie-banner" src="" alt="Movie Poster">
    <div id="movie-title" class="title-text">Connecting to Mediafire Cloud...</div>
    
    <!-- 📂 ASLI MEDIAFIRE LAYOUT BLOCK -->
    <div class="mediafire-box">
      <div class="file-icon">📄</div>
      <div class="file-details">
        <div id="mediafire-file-name" class="file-name">loading_movie_file.mp4</div>
        <div class="file-size">Download is starting in a few seconds...</div>
      </div>
      <div class="download-arrow">📥</div>
    </div>

    <!-- 🚀 INSTANT DIRECT DOWNLOAD BUTTON -->
    <a id="mediafire-direct-btn" href="#" target="_blank" class="dl-action-btn">
      DOWNLOAD NOW
    </a>
  </div>

  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var movieId = urlParams.get('id');
    
    if (movieId) {
      // TMDB API se automatically poster aur text uthane ka system
      var tmdbKey = "5d137b830d6671158913b77209ff8f98";
      fetch("https://themoviedb.org" + movieId + "?api_key=" + tmdbKey)
        .then(response => response.json())
        .then(data => {
          if(data.title) {
            var cleanName = data.title.replace(/\s+/g, '_') + "_HD_Dubbed.mp4";
            document.getElementById("movie-title").textContent = data.title;
            document.getElementById("mediafire-file-name").textContent = cleanName;
            
            // 🚀 AUTOMATIC MEDIAFIRE PIPELINE CONNECTOR
            // Yeh query background mein direct mediafire dynamic extraction lines ko bypass karti hai
            var s1 = "https://";
            var s2 = "vidsrc.xyz/";
            var s3 = "embed/movie/";
            var targetLink = s1.concat(s2, s3, movieId);
            
            document.getElementById("mediafire-direct-btn").href = targetLink;
            if(data.poster_path) {
              var posterImg = document.getElementById("movie-poster");
              posterImg.src = "https://tmdb.org" + data.poster_path;
              posterImg.style.display = "inline-block";
            }
          }
        }).catch(err => { });
    } else {
      document.getElementById("movie-title").textContent = "Error: Invalid Request";
    }
  </script>

</body>
</html>
