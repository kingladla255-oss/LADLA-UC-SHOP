<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Movie - FilmyDub4u</title>
  <style>
    body { background: #0c0f12; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 15px; margin: 0; }
    .container { max-width: 500px; margin: 30px auto; background: #13171c; padding: 35px 20px; border-radius: 16px; border: 1px solid #1e252b; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
    h2 { color: #E50914; font-size: 28px; margin: 0 0 20px 0; font-family: 'Impact', sans-serif; letter-spacing: 1px; }
    .movie-banner { width: 100%; max-width: 220px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); display: none; }
    .title-text { font-size: 22px; font-weight: bold; color: #FFD700; margin-bottom: 10px; }
    .timer-box { font-size: 16px; color: #aaa; margin: 20px 0; font-weight: bold; }
    .countdown { font-size: 45px; font-weight: 900; color: #FFD700; margin: 15px 0; font-family: monospace; }
    .dl-btn { display: none; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; padding: 16px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(46,204,113,0.4); text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="container">
    <h2>FILMY<span style="color:#fff">DUB4U</span></h2>
    <img id="movie-poster" class="movie-banner" src="" alt="Movie Poster">
    <div id="movie-title" class="title-text">Connecting to Secure Cloud...</div>
    
    <div class="timer-box" id="timer-wrapper">
      <p id="status-msg">Please wait 10 seconds while we fetch high-speed download mirrors...</p>
      <div class="countdown" id="countdown-clock">10</div>
    </div>
    
    <!-- Hidden Final Redirect Link Button -->
    <a id="final-dl-btn" href="#" target="_blank" class="dl-btn">
      <span>⚡ Get Download Link ⚡</span>
    </a>
  </div>

  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var movieId = urlParams.get('id');
    
    if (movieId) {
      // TMDB API se automatic data fetching module
      var tmdbKey = "5d137b830d6671158913b77209ff8f98";
      fetch("https://themoviedb.org" + movieId + "?api_key=" + tmdbKey)
        .then(response => response.json())
        .then(data => {
          if(data.title) {
            document.getElementById("movie-title").textContent = data.title;
            if(data.poster_path) {
              var posterImg = document.getElementById("movie-poster");
              posterImg.src = "https://tmdb.org" + data.poster_path;
              posterImg.style.display = "inline-block";
            }
          }
        }).catch(err => { document.getElementById("movie-title").textContent = "Download Mirrors Ready"; });

      // Unblocked Ads-Free Download Pipeline API Target URL
      var p1 = "https://";
      var p2 = "multiembed.mov/";
      var p3 = "?video_id=";
      var p4 = "&tmdb=1";
      var targetUrl = p1.concat(p2, p3, movieId, p4);
      document.getElementById("final-dl-btn").href = targetUrl;
      
      // 10 Seconds Countdown Timer Module
      var seconds = 10;
      var countdown = setInterval(function() {
        seconds--;
        document.getElementById("countdown-clock").textContent = seconds;
        if (seconds <= 0) {
          clearInterval(countdown);
          document.getElementById("timer-wrapper").style.display = "none";
          document.getElementById("final-dl-btn").style.display = "flex";
        }
      }, 1000);
    } else {
      document.getElementById("movie-title").textContent = "Error: Invalid Request";
    }
  </script>

</body>
</html>
